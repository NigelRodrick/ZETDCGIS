# Android only: EAS cloud build → APK (internal distribution).
# Trigger: Actions → "Build Android APK", or push a tag like v1.0.0-android
# Requires repo secret EXPO_TOKEN (https://expo.dev/accounts/[account]/settings/access-tokens)
# First time: run `npx eas-cli@latest init` locally and commit the added projectId in app.json.

name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*-android"

concurrency:
  group: eas-build-android-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: EAS Build (Android APK)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK on EAS
        run: eas build --platform android --profile android-apk --non-interactive --wait
