# Android: local Gradle build in GitHub Actions (no Expo account/token required).
# Builds an APK and uploads it as a workflow artifact, with optional GitHub Release on v*-android tags.

name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      clear_cache:
        description: Clean Gradle build outputs before build
        type: boolean
        default: false
      create_github_release:
        description: When running on a version tag, upload APK to a GitHub Release
        type: boolean
        default: true
  push:
    tags:
      - "v*-android"

concurrency:
  group: apk-build-android-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: Gradle Build (Android APK)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      has_artifact: ${{ steps.prepare_apk.outputs.upload }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Clean Gradle outputs
        if: github.event_name == 'workflow_dispatch' && inputs.clear_cache
        run: |
          cd android
          ./gradlew clean

      - name: Build APK (release)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon --no-build-cache

      - name: Prepare APK artifact path
        id: prepare_apk
        if: success()
        run: |
          APK_PATH="android/app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "APK not found at $APK_PATH"
            exit 0
          fi
          echo "upload=true" >> "$GITHUB_OUTPUT"
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          {
            echo "## Android APK build"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| APK path | \`$APK_PATH\` |"
            echo "| Trigger | \`${{ github.event_name }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload APK artifact
        if: success() && steps.prepare_apk.outputs.upload == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: ${{ steps.prepare_apk.outputs.path }}
          if-no-files-found: error

  release:
    name: GitHub Release (Android)
    needs: build
    if: |
      always()
      && needs.build.result == 'success'
      && needs.build.outputs.has_artifact == 'true'
      && startsWith(github.ref, 'refs/tags/v')
      && contains(github.ref, '-android')
      && (github.event_name == 'push' || inputs.create_github_release)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK from workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} (Android)
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
