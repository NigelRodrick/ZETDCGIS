# Android: EAS cloud build (APK) → job summary, Actions artifact, GitHub Release on v*-android tags.
# Secrets: EXPO_TOKEN. Releases use the default GITHUB_TOKEN (contents: write on release job only).

name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      clear_cache:
        description: Clear EAS build cache before this build
        type: boolean
        default: false
      build_message:
        description: Short message stored with the build on Expo (optional)
        type: string
        required: false
        default: ""
      create_github_release:
        description: When running on a version tag, upload APK to a GitHub Release
        type: boolean
        default: true
  push:
    tags:
      - "v*-android"

concurrency:
  group: eas-build-android-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: EAS Build (Android APK)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      EAS_JSON: eas-result.json
    outputs:
      artifact_url: ${{ steps.summary.outputs.artifact_url }}
      has_artifact: ${{ steps.download_apk.outputs.upload }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          packager: npm
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Apply workflow_dispatch options
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "CLEAR_CACHE=${{ inputs.clear_cache }}" >> "$GITHUB_ENV"
          echo "BUILD_MESSAGE<<__EAS_MSG__" >> "$GITHUB_ENV"
          echo "${{ inputs.build_message }}" >> "$GITHUB_ENV"
          echo "__EAS_MSG__" >> "$GITHUB_ENV"

      - name: Build Android APK on EAS
        id: eas
        run: |
          set -eo pipefail
          ARGS=(build --platform android --profile android-apk --non-interactive --wait --json)
          if [ "${CLEAR_CACHE:-false}" = "true" ]; then
            ARGS+=(--clear-cache)
          fi
          if [ -n "${BUILD_MESSAGE:-}" ]; then
            ARGS+=(-m "$BUILD_MESSAGE")
          fi
          eas "${ARGS[@]}" | tee "$EAS_JSON"

      - name: Job summary
        id: summary
        if: success()
        run: |
          BUILD_ID=$(jq -r '.[0].id // empty' "$EAS_JSON")
          STATUS=$(jq -r '.[0].status // empty' "$EAS_JSON")
          ARTIFACT_URL=$(jq -r '.[0].artifacts.applicationArchiveUrl // empty' "$EAS_JSON")
          echo "artifact_url=$ARTIFACT_URL" >> "$GITHUB_OUTPUT"
          {
            echo "## Android EAS build"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Build ID | \`$BUILD_ID\` |"
            echo "| Status | \`$STATUS\` |"
            echo "| Artifact URL | $ARTIFACT_URL |"
            echo ""
            echo "Logs and history: [Expo dashboard](https://expo.dev)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Download APK for GitHub artifact
        id: download_apk
        if: success()
        run: |
          echo "upload=false" >> "$GITHUB_OUTPUT"
          URL=$(jq -r '.[0].artifacts.applicationArchiveUrl // empty' "$EAS_JSON")
          if [ -z "$URL" ]; then
            echo "No applicationArchiveUrl in build result; skipping download."
            exit 0
          fi
          OUT="MeterCollect-${{ github.ref_name }}-${{ github.run_number }}.apk"
          curl -fL --retry 3 --retry-delay 5 -o "$OUT" "$URL"
          echo "upload=true" >> "$GITHUB_OUTPUT"
          echo "path=$OUT" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        if: success() && steps.download_apk.outputs.upload == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: ${{ steps.download_apk.outputs.path }}
          if-no-files-found: error

  release:
    name: GitHub Release (Android)
    needs: build
    if: |
      always()
      && needs.build.result == 'success'
      && needs.build.outputs.has_artifact == 'true'
      && startsWith(github.ref, 'refs/tags/v')
      && contains(github.ref, '-android')
      && (github.event_name == 'push' || inputs.create_github_release)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download APK from workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk-${{ github.run_number }}
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} (Android)
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
